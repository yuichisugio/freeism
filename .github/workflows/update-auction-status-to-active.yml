name: Auction status updated from PENDING to ACTIVE

on:
  schedule:
    # 毎日日本時間の00:00に実行 (UTC 15:00)
    - cron: "0 15 * * *"

  # 手動実行用トリガー
  workflow_dispatch:

jobs:
  start-auctions:
    name: Start Pending Auctions
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            node_modules
            .next/cache
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Transpile TypeScript files
        run: pnpm tsc --project tsconfig.scripts.json

      - name: Run auction start script
        run: NODE_OPTIONS="--experimental-specifier-resolution=node" pnpm run actions:update-auction-status-to-active
