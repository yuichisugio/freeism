name: Vercel Production Deployment

on:
  push:
    branches: [main]

# 常に最新1本のみ残す
concurrency:
  group: prod # ← 固定名に変更
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x" # LTS を追従
  PNPM_VERSION: "9" # major 指定で OK

permissions:
  contents: read
  deployments: write

jobs:
  deploy-production:
    runs-on: ubuntu-22.04 # zstd 対応 runner
    steps:
      # 0. 取得
      - uses: actions/checkout@v4

      # 1. Node + pnpm (Corepack)
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Enable Corepack / set pnpm version
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      # 2. 依存インストール（オフライン優先）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # 3. Next.js / Turborepo キャッシュ (.next と .turbo)
      - uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .turbo        # ← RemoteCache 不使用時もローカルキャッシュ
          key: ${{ runner.os }}-next-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-next-main-

      # 4. Prisma Migrate（変更がある時のみ）
      - name: Check pending migrations
        id: mig
        run: |
          pnpm dlx prisma migrate status --schema prisma/schema.prisma --json > status.json
          echo "pending=$(jq .hasPendingMigrations status.json)" >> $GITHUB_OUTPUT

      - name: Prisma Migrate
        if: steps.mig.outputs.pending == 'true'
        run: pnpm dlx prisma migrate deploy --skip-generate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      # 5. Turborepo Remote Cache（環境変数は先に GitHub Secrets で登録）
      - name: Set Turborepo env
        run: |
          echo "TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}" >> $GITHUB_ENV
          echo "TURBO_TEAM=${{ secrets.TURBO_TEAM }}"   >> $GITHUB_ENV

      # 6. Build
      - name: Build Project Artifacts
        run: pnpm dlx vercel build --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.PROD_AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.PROD_AUTH_GOOGLE_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NODE_ENV: "production"
          CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_PUBLIC_URL: ${{ secrets.CLOUDFLARE_PUBLIC_URL }}
          ENABLE_IMAGE_UPLOAD: true
          NEXT_PUBLIC_ENABLE_IMAGE_UPLOAD: true
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          DOMAIN: ${{ secrets.DOMAIN }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NEXT_PUBLIC_VAPID_SUBJECT: ${{ secrets.NEXT_PUBLIC_VAPID_SUBJECT }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}

      # 7. Deploy (pre-built)
      - uses: vercel/gh-action@v2
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          prod: true
          prebuilt: true
